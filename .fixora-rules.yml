    - pattern: $OBJ.find(...)
    - pattern: find(...)
  message: 'SQL Injection via `query_param`

    Vulnerable Sink: Passes untrusted data directly to `db_mongo.users.find`.'
  severity: ERROR
  languages:
  - python
  metadata: &id005
    category: security
    technology:
