    source: fixora-ai-analysis
    vulnerability_type: SQL Injection
    confidence: HIGH
    wrapper_defined_in: database.py
    wraps:
    - db_mongo.users.find
    modules_used:
    - pymongo
    vulnerable_parameter: query_param
    malicious_payload: bulk_insert("users; DROP TABLE users; --", data)
    exploit_explanation: Payload triggers the vulnerability.
    exploit_injected_example: search_users(query_param = bulk_insert("users; DROP
      TABLE users; --", data))
    impact_summary: Can leak the entire database, bypass authentication, or destroy
      critical records.
    cwe: *id002
    owasp: *id003
