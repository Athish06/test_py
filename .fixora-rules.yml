  - patterns:
    - pattern-inside: "@$APP.$METHOD(...)\ndef $FUNC(..., $ARG, ...):\n    ..."
    - metavariable-regex:
        metavariable: $METHOD
        regex: (?i)^(get|post|put|delete|patch|route)$
    - pattern: $ARG
  pattern-sinks:
  - pattern: update(...)
  - pattern: $OBJ.update(...)
  message: 'Taint tracked to vulnerable wrapper `update`.

