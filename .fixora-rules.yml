  - pattern: flask.request.$W
  - pattern: django.http.HttpRequest.$W
  - patterns:
    - pattern-inside: "@$APP.$METHOD(...)\ndef $FUNC(..., $ARG, ...):\n    ..."
    - metavariable-regex:
        metavariable: $METHOD
        regex: (?i)^(get|post|put|delete|patch|route)$
    - pattern: $ARG
  pattern-sinks:
  - pattern: verify_token(...)
  - pattern: $OBJ.verify_token(...)
  - patterns:
    - pattern-inside: "def verify_token(...):\n  ..."
    - pattern: jwt.decode(..., algorithms=["RS256", "HS256"])
  message: 'Taint tracked to vulnerable wrapper `verify_token`.

    Cryptographic Failure via `token`

    Vulnerable Sink: Passes untrusted data directly to `jwt.decode`.'
  severity: ERROR
  languages:
