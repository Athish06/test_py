    - pattern: decode(...)
  message: 'Cryptographic Failure via `token`

    Vulnerable Sink: Passes untrusted data directly to `jwt.decode`.'
  severity: ERROR
  languages:
  - python
  metadata: &id001
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Cryptographic Failure
    confidence: HIGH
    wrapper_defined_in: auth.py
    wraps:
    - jwt.decode
    modules_used:
    - jwt
    vulnerable_parameter: token
    malicious_payload: <malicious_data>
    exploit_explanation: An attacker can forge a token using HS256 with the PUBLIC
      key as the secret and the server will accept it.
    exploit_injected_example: verify_token(token = <malicious_data>)
    impact_summary: Attackers can bypass authentication and gain unauthorized access
      to the system.
- id: fixora-taint-verify-token
  mode: taint
  pattern-sources:
  - pattern: request.headers.get("Authorization")
  - pattern: request.$W(...)
